<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.todo-container {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  color: rgb(235, 52, 27);
}

.todo-input {
  display: flex;
  margin-bottom: 20px;
}

.todo-input input {
  flex: 1;
  padding: 8px;
  border: 2px solid #ddd;
  border-radius: 8px;
}

.todo-input button {
  padding: 8px 12px;
  margin-left:2px ;
  cursor: pointer;
}

#todolist {
  list-style: none;
  padding: 0;
}

#todolist li {
  display: flex;
  justify-content: space-between;
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.delete {
  background: rgb(0, 157, 255);
  color: white;
  border: none;
  cursor: pointer;
}

.delete:hover {
  background: rgb(255, 0, 0);
}

.add{
    border: none;
}

.add:hover {
    background-color: tomato;
    color: whitesmoke;
    border-color: transparent;
}
</style>
<body>

  <div class="todo-container">
    <h1>My Todo List</h1>

    <div class="todo-input">
      <input id="inputt" type="text" placeholder="Add a new task..." />
      <button class="add" onclick="addtask()">Add</button>
    </div>

       <ul id="todolist">
     
    </ul>

  </div>

</body>
<script>
let inputt = document.getElementById("inputt")
let todolist = document.getElementById("todolist")

function addtask(){
    if(inputt.value === ""){
      alert("plese write something")
    }
    else{
       let li = document.createElement("li")
       li.innerHTML = inputt.value
       li.innerHTML = inputt.value + ' <button class="delete">X</button>';
       todolist.appendChild(li)
       inputt.value = "";
    }
    todolist.addEventListener("click",function(e){
        if (e.target.tagName === "BUTTON") {
            e.target.parentElement.remove()
        }
    },false)
}


 
</script>
</html>
